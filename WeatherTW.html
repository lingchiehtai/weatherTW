<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台灣氣象 - Taiwan Weather</title>
    <!-- Tailwind CSS (用於快速切版) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome (用於圖標) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 全局設定 */
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f2f5; /* 背景灰，模擬手機桌面背景 */
            -webkit-tap-highlight-color: transparent;
        }

        /* 模擬手機 App 容器 */
        #app-container {
            max-width: 480px; /* 手機寬度限制 */
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* 隱藏捲軸但保留功能 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Yahoo! JP 風格配色變數 */
        :root {
            --y-red: #e60033;
            --y-blue: #0073e6;
            --y-gray: #666666;
            --y-orange: #ff9900;
        }

        .text-y-red { color: var(--y-red); }
        .text-y-blue { color: var(--y-blue); }
        .bg-y-red { background-color: var(--y-red); }
        
        /* 頁籤切換動畫 */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 底部導覽列樣式 (類似 Yahoo App 的頁首下方導覽) */
        .nav-item.active {
            color: #000;
            font-weight: 700;
            border-bottom: 3px solid var(--y-red);
        }
    </style>
</head>
<body class="text-gray-800">

    <div id="app-container">
        
        <!-- 1. Header & Location (Fixed) -->
        <header class="sticky top-0 z-50 bg-white border-b border-gray-100">
            <div class="flex items-center justify-between px-4 py-3">
                <div class="flex items-center space-x-2" id="location-trigger">
                    <i class="fa-solid fa-location-dot text-y-red text-lg"></i>
                    <!-- 模擬下拉選單 -->
                    <select id="location-select" class="text-lg font-bold bg-transparent border-none outline-none appearance-none cursor-pointer pr-4">
                        <option value="Taipei">臺北市</option>
                        <option value="NewTaipei">新北市</option>
                        <option value="Kaohsiung" selected>高雄市</option>
                        <option value="Taichung">臺中市</option>
                        <option value="Tainan">臺南市</option>
                        <option value="Hualien">花蓮縣</option>
                    </select>
                    <i class="fa-solid fa-chevron-down text-xs text-gray-400 -ml-2 pointer-events-none"></i>
                </div>
                
                <button onclick="getUserLocation()" class="p-2 rounded-full active:bg-gray-100 transition">
                    <i class="fa-solid fa-crosshairs text-gray-500"></i>
                </button>
            </div>

            <!-- Navigation Tabs -->
            <nav class="flex justify-around text-gray-500 text-sm border-b border-gray-200">
                <button onclick="switchTab('now')" id="nav-now" class="nav-item active flex-1 py-3 text-center transition-all">
                    現在
                </button>
                <button onclick="switchTab('observation')" id="nav-observation" class="nav-item flex-1 py-3 text-center transition-all">
                    觀測
                </button>
                <button onclick="switchTab('forecast')" id="nav-forecast" class="nav-item flex-1 py-3 text-center transition-all">
                    預報
                </button>
            </nav>
        </header>

        <!-- Main Content Area -->
        <main class="pb-10 relative">

            <!-- TAB 1: 現在 (Now) -->
            <section id="tab-now" class="tab-content active px-4 pt-6">
                <!-- Main Temperature Area -->
                <div class="text-center mb-6">
                    <div class="text-gray-500 text-sm mb-1" id="current-date">--月--日</div>
                    <div class="flex justify-center items-start">
                        <span class="text-8xl font-light tracking-tighter" id="current-temp">31</span>
                        <span class="text-3xl mt-4 font-light">°C</span>
                    </div>
                    
                    <div class="flex justify-center items-center gap-4 mt-2 text-lg font-medium">
                        <span class="text-y-red">H: <span id="today-high">33</span>°</span>
                        <span class="text-gray-300">|</span>
                        <span class="text-y-blue">L: <span id="today-low">26</span>°</span>
                    </div>

                    <div class="flex justify-center items-center gap-3 mt-4">
                        <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1">
                            <i class="fa-solid fa-umbrella"></i> <span id="current-rain">20%</span>
                        </span>
                        <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1">
                            AQI <span id="current-aqi">45 良好</span>
                        </span>
                    </div>
                </div>

                <!-- AI Weather Assistant -->
                <div class="mt-8 bg-gradient-to-r from-blue-50 to-indigo-50 rounded-2xl p-4 border border-blue-100 shadow-sm flex items-start gap-3">
                    <div class="bg-white p-2 rounded-full shadow-sm text-blue-500">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <div>
                        <h3 class="text-xs font-bold text-blue-800 mb-1">AI 氣象助理</h3>
                        <p class="text-sm text-gray-700 font-medium leading-relaxed" id="ai-summary">
                            <!-- JS will inject text here -->
                            載入中...
                        </p>
                    </div>
                </div>
                
                <!-- Advertisement placeholder (simulating Yahoo style) -->
                <div class="mt-8 h-24 bg-gray-100 rounded-lg flex items-center justify-center text-gray-300 text-xs border border-dashed border-gray-300">
                    廣告區域
                </div>
            </section>


            <!-- TAB 2: 觀測 (Observation) -->
            <section id="tab-observation" class="tab-content px-4 pt-6">
                <h2 class="text-lg font-bold mb-4 border-l-4 border-y-red pl-3">詳細觀測數據</h2>
                
                <div class="grid grid-cols-2 gap-3">
                    <!-- Cards -->
                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between h-32">
                        <div class="text-gray-400 text-xs"><i class="fa-solid fa-droplet text-blue-400 mr-1"></i> 降雨機率</div>
                        <div class="text-2xl font-bold mt-1" id="obs-rain-prob">30<span class="text-sm">%</span></div>
                        <div class="text-xs text-gray-500">偶有短暫陣雨</div>
                    </div>

                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between h-32">
                        <div class="text-gray-400 text-xs"><i class="fa-solid fa-water text-cyan-400 mr-1"></i> 相對濕度</div>
                        <div class="text-2xl font-bold mt-1" id="obs-humidity">78<span class="text-sm">%</span></div>
                        <div class="text-xs text-gray-500">體感潮濕</div>
                    </div>

                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between h-32">
                        <div class="text-gray-400 text-xs"><i class="fa-solid fa-wind text-gray-400 mr-1"></i> 風速</div>
                        <div class="text-2xl font-bold mt-1" id="obs-wind">3.5<span class="text-sm">m/s</span></div>
                        <div class="text-xs text-gray-500">西北風 (微風)</div>
                    </div>

                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between h-32">
                        <div class="text-gray-400 text-xs"><i class="fa-solid fa-sun text-y-orange mr-1"></i> 紫外線</div>
                        <div class="text-2xl font-bold mt-1 text-y-orange" id="obs-uv">8</div>
                        <div class="text-xs text-gray-500">過量級 (需防曬)</div>
                    </div>

                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between h-32">
                        <div class="text-gray-400 text-xs"><i class="fa-solid fa-eye text-indigo-400 mr-1"></i> 能見度</div>
                        <div class="text-2xl font-bold mt-1">15<span class="text-sm">km</span></div>
                        <div class="text-xs text-gray-500">視野良好</div>
                    </div>

                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between h-32">
                        <div class="text-gray-400 text-xs"><i class="fa-regular fa-clock text-y-red mr-1"></i> 日出/日落</div>
                        <div class="flex justify-between items-end mt-2">
                            <div class="text-center">
                                <div class="text-xs text-gray-400">日出</div>
                                <div class="font-bold">05:40</div>
                            </div>
                            <div class="text-center">
                                <div class="text-xs text-gray-400">日落</div>
                                <div class="font-bold">18:25</div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>


            <!-- TAB 3: 預報 (Forecast) -->
            <section id="tab-forecast" class="tab-content px-0 pt-6">
                
                <!-- 24 Hours Forecast -->
                <div class="px-4 mb-2 flex justify-between items-end">
                    <h2 class="text-lg font-bold border-l-4 border-y-red pl-3">24小時預報</h2>
                    <span class="text-xs text-gray-400">滑動查看</span>
                </div>
                
                <div class="overflow-x-auto hide-scrollbar pb-6 px-4">
                    <div class="flex space-x-4 w-max" id="hourly-forecast-container">
                        <!-- JS generated content will go here -->
                        <!-- Example format -->
                        <div class="flex flex-col items-center min-w-[3.5rem]">
                            <span class="text-xs text-gray-500 mb-2">14:00</span>
                            <i class="fa-solid fa-cloud-sun text-xl text-gray-400 mb-2"></i>
                            <span class="text-lg font-bold">31°</span>
                            <span class="text-[10px] text-blue-500 mt-1">10%</span>
                        </div>
                    </div>
                </div>

                <div class="h-2 bg-gray-100 mb-6"></div>

                <!-- 7 Days Forecast -->
                <div class="px-4">
                    <h2 class="text-lg font-bold mb-4 border-l-4 border-y-red pl-3">未來 7 天預報</h2>
                    
                    <div class="flex flex-col divide-y divide-gray-100" id="weekly-forecast-container">
                        <!-- JS generated content -->
                    </div>
                </div>

                <div class="mt-8 mb-4 text-center text-xs text-gray-400">
                    資料來源：交通部中央氣象署 (CWA)
                </div>
            </section>

        </main>
    </div>

    <!-- JavaScript Implementation -->
    <script>
        // ==========================================
        // 1. Data Mocking (模擬中央氣象署資料結構)
        // ==========================================
        // 實際開發可將此部分替換為 fetch('CWA API URL')
        
        const weatherData = {
            "Kaohsiung": {
                name: "高雄市",
                current: { temp: 31, high: 33, low: 27, rain: 20, aqi: 45, aqiText: "良好", uv: 8, hum: 78, wind: 3.2 },
                aiSummary: "今日多雲悶熱，午後山區有局部短暫陣雨，外出請備傘。",
                hourly: generateHourlyData(31),
                daily: generateDailyData(32, 27)
            },
            "Taipei": {
                name: "臺北市",
                current: { temp: 28, high: 30, low: 24, rain: 60, aqi: 55, aqiText: "普通", uv: 4, hum: 85, wind: 5.1 },
                aiSummary: "受東北季風影響，整日陰雨綿綿，氣溫轉涼請添加衣物。",
                hourly: generateHourlyData(28, true),
                daily: generateDailyData(29, 23, true)
            },
            "NewTaipei": { name: "新北市", current: { temp: 27, high: 29, low: 23, rain: 70, aqi: 50, aqiText: "良好", uv: 3, hum: 88, wind: 4.5 }, aiSummary: "陰有雨，出門記得攜帶雨具，早晚偏涼注意保暖。", hourly: generateHourlyData(27, true), daily: generateDailyData(28, 22, true) },
            "Taichung": { name: "臺中市", current: { temp: 30, high: 32, low: 25, rain: 10, aqi: 85, aqiText: "普通", uv: 7, hum: 70, wind: 2.8 }, aiSummary: "晴朗穩定，紫外線強烈，空氣品質普通，敏感族群留意。", hourly: generateHourlyData(30), daily: generateDailyData(32, 25) },
            "Tainan": { name: "臺南市", current: { temp: 31, high: 33, low: 26, rain: 10, aqi: 60, aqiText: "普通", uv: 8, hum: 75, wind: 3.0 }, aiSummary: "天氣炎熱，午後有零星陣雨機率，多補充水分。", hourly: generateHourlyData(31), daily: generateDailyData(33, 26) },
            "Hualien": { name: "花蓮縣", current: { temp: 29, high: 31, low: 24, rain: 40, aqi: 30, aqiText: "良好", uv: 6, hum: 80, wind: 4.0 }, aiSummary: "多雲時陰，迎風面偶有雨，海邊活動請注意安全。", hourly: generateHourlyData(29, true), daily: generateDailyData(30, 24) }
        };

        // 輔助函數：生成隨機每小時資料
        function generateHourlyData(baseTemp, isRainy = false) {
            let data = [];
            let currentHour = new Date().getHours();
            for(let i=0; i<24; i++) {
                let h = (currentHour + i) % 24;
                let displayH = h.toString().padStart(2, '0') + ":00";
                // 模擬氣溫曲線 (白天熱晚上涼)
                let tempChange = 0;
                if(h >= 10 && h <= 15) tempChange = 2;
                else if (h >= 0 && h <= 5) tempChange = -3;
                
                let icon = isRainy ? 'fa-cloud-rain text-blue-400' : ((h>=6 && h<=18)? 'fa-sun text-y-orange' : 'fa-moon text-indigo-300');
                if(isRainy && Math.random() > 0.5) icon = 'fa-cloud-showers-heavy text-blue-600';
                
                data.push({
                    time: displayH,
                    temp: baseTemp + tempChange + Math.floor(Math.random()*2),
                    icon: icon,
                    rainProb: isRainy ? 50 + Math.floor(Math.random()*40) : Math.floor(Math.random()*20)
                });
            }
            return data;
        }

        // 輔助函數：生成隨機一週資料
        function generateDailyData(highBase, lowBase, isRainy = false) {
            let data = [];
            let days = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
            let today = new Date().getDay();
            
            for(let i=0; i<7; i++) {
                let dIndex = (today + i) % 7;
                let dateObj = new Date();
                dateObj.setDate(dateObj.getDate() + i);
                let dateStr = (dateObj.getMonth()+1) + "/" + dateObj.getDate();
                
                let icon = 'fa-sun text-y-orange';
                let rain = 10;
                
                if(isRainy || Math.random() > 0.7) {
                    icon = 'fa-cloud-rain text-blue-400';
                    rain = 60 + Math.floor(Math.random()*30);
                } else if (Math.random() > 0.4) {
                    icon = 'fa-cloud-sun text-gray-400';
                    rain = 20;
                }

                data.push({
                    date: dateStr,
                    day: i===0 ? '今天' : days[dIndex],
                    high: highBase + Math.floor(Math.random()*3 - 1),
                    low: lowBase + Math.floor(Math.random()*3 - 1),
                    icon: icon,
                    rainProb: rain
                });
            }
            return data;
        }

        // ==========================================
        // 2. App Logic
        // ==========================================

        const locationSelect = document.getElementById('location-select');
        let currentLocation = "Kaohsiung"; // Default

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            updateDate();
            renderData(currentLocation);
        });

        // 監聽地點變更
        locationSelect.addEventListener('change', (e) => {
            currentLocation = e.target.value;
            // 模擬載入延遲，增加真實感
            document.body.style.opacity = '0.7';
            setTimeout(() => {
                renderData(currentLocation);
                document.body.style.opacity = '1';
                // Reset scroll logic if needed
                window.scrollTo({top: 0, behavior: 'smooth'});
            }, 300);
        });

        // 頁籤切換邏輯
        function switchTab(tabId) {
            // Update Nav Styles
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${tabId}`).classList.add('active');

            // Update Content Visibility
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        // 模擬 GPS 定位
        function getUserLocation() {
            alert("正在使用 GPS 定位... \n(模擬切換至臺北市)");
            locationSelect.value = "Taipei";
            locationSelect.dispatchEvent(new Event('change'));
        }

        // 更新日期顯示
        function updateDate() {
            const now = new Date();
            const str = `${now.getMonth()+1}月${now.getDate()}日 ${['週日','週一','週二','週三','週四','週五','週六'][now.getDay()]}`;
            document.getElementById('current-date').innerText = str;
        }

        // 核心渲染函式
        function renderData(locKey) {
            const data = weatherData[locKey];
            if(!data) return;

            // --- Tab 1: Now ---
            document.getElementById('current-temp').innerText = data.current.temp;
            document.getElementById('today-high').innerText = data.current.high;
            document.getElementById('today-low').innerText = data.current.low;
            document.getElementById('current-rain').innerText = data.current.rain + '%';
            document.getElementById('current-aqi').innerText = `${data.current.aqi} ${data.current.aqiText}`;
            
            // AI Summary color logic (alert if AQI bad or rain high)
            const aiText = document.getElementById('ai-summary');
            aiText.innerText = data.aiSummary;

            // --- Tab 2: Observation ---
            document.getElementById('obs-rain-prob').innerHTML = `${data.current.rain}<span class="text-sm">%</span>`;
            document.getElementById('obs-humidity').innerHTML = `${data.current.hum}<span class="text-sm">%</span>`;
            document.getElementById('obs-wind').innerHTML = `${data.current.wind}<span class="text-sm">m/s</span>`;
            
            const uvEl = document.getElementById('obs-uv');
            uvEl.innerText = data.current.uv;
            // UV Color logic
            if(data.current.uv >= 8) uvEl.className = "text-2xl font-bold mt-1 text-purple-600";
            else if(data.current.uv >= 6) uvEl.className = "text-2xl font-bold mt-1 text-y-orange";
            else uvEl.className = "text-2xl font-bold mt-1 text-green-500";

            // --- Tab 3: Forecast ---
            
            // 24H Forecast Render
            const hourlyContainer = document.getElementById('hourly-forecast-container');
            hourlyContainer.innerHTML = '';
            data.hourly.forEach(h => {
                const html = `
                    <div class="flex flex-col items-center min-w-[3.5rem] snap-center">
                        <span class="text-xs text-gray-500 mb-2">${h.time}</span>
                        <i class="fa-solid ${h.icon} text-xl mb-2"></i>
                        <span class="text-lg font-bold">${h.temp}°</span>
                        <span class="text-[10px] text-blue-500 mt-1 font-bold"><i class="fa-solid fa-umbrella text-[8px]"></i> ${h.rainProb}%</span>
                    </div>
                `;
                hourlyContainer.innerHTML += html;
            });

            // Weekly Forecast Render
            const weeklyContainer = document.getElementById('weekly-forecast-container');
            weeklyContainer.innerHTML = '';
            data.daily.forEach(d => {
                const html = `
                    <div class="flex items-center justify-between py-3">
                        <div class="w-20 text-sm">
                            <div class="font-bold text-gray-700">${d.day}</div>
                            <div class="text-xs text-gray-400">${d.date}</div>
                        </div>
                        <div class="flex-1 flex justify-center">
                            <i class="fa-solid ${d.icon} text-xl"></i>
                        </div>
                        <div class="w-16 text-center text-xs text-blue-500 font-bold bg-blue-50 rounded py-1">
                            ${d.rainProb}%
                        </div>
                        <div class="w-24 text-right flex justify-end gap-2 text-sm font-bold">
                            <span class="text-y-red">${d.high}°</span>
                            <span class="text-gray-300">/</span>
                            <span class="text-y-blue">${d.low}°</span>
                        </div>
                    </div>
                `;
                weeklyContainer.innerHTML += html;
            });
        }
    </script>
</body>
</html>
