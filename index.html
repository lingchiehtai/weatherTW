<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台灣氣象助手 (Taiwan Weather)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 自定義字型與樣式優化 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f0f2f5;
            -webkit-tap-highlight-color: transparent;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        #root {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            /* 海景風漸層背景：淡青色 -> 極淡藍 -> 白 */
            background: linear-gradient(180deg, #E0F7FA 0%, #F0F9FF 50%, #FFFFFF 100%);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

        const Eye = (p) => <Icon {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></Icon>;
        const Sunrise = (p) => <Icon {...p}><path d="M12 2v8"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m8 6 4-4 4 4"/><path d="M16 18a4 4 0 0 0-8 0"/></Icon>;
        const Sunset = (p) => <Icon {...p}><path d="M12 10V2"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m16 6-4 4-4-4"/><path d="M16 18a4 4 0 0 0-8 0"/></Icon>;
        const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M9 3v4"/><path d="M3 5h4"/><path d="M3 9h4"/></Icon>;
        const Bot = (p) => <Icon {...p}><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></Icon>;
        const Leaf = (p) => <Icon {...p}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.77 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></Icon>;

        // --- 資料設定 ---
        const CITIES = [

            { name: "新北市", districts: ["萬里區", "金山區", "板橋區", "汐止區", "深坑區", "石碇區", "瑞芳區", "平溪區", "雙溪區", "貢寮區", "新店區", "樹林區", "鶯歌區", "三峽區", "淡水區", "蘆洲區", "五股區", "泰山區", "林口區", "土城區", "中和區", "永和區", "新莊區", "三重區", "八里區", "石門區", "三芝區", "烏來區"] },
            { name: "桃園市", districts: ["中壢區", "平鎮區", "龍潭區", "楊梅區", "新屋區", "觀音區", "桃園區", "龜山區", "八德區", "大溪區", "復興區", "大園區", "蘆竹區"] },

            { name: "台南市", districts: ["中西區", "東區", "南區", "北區", "安平區", "安南區", "永康區", "歸仁區", "新化區", "左鎮區", "玉井區", "楠西區", "南化區", "仁德區", "關廟區", "龍崎區", "官田區", "麻豆區", "佳里區", "西港區", "七股區", "將軍區", "學甲區", "北門區", "新營區", "後壁區", "白河區", "東山區", "六甲區", "下營區", "柳營區", "鹽水區", "善化區", "大內區", "山上區", "新市區", "安定區"] },

            { name: "基隆市", districts: ["仁愛區", "信義區", "中正區", "中山區", "安樂區", "暖暖區", "七堵區"] },
            { name: "新竹市", districts: ["東區", "北區", "香山區"] },
            { name: "嘉義市", districts: ["東區", "西區"] },
            { name: "新竹縣", districts: ["竹北市", "竹東鎮", "新埔鎮", "關西鎮", "湖口鄉", "新豐鄉", "芎林鄉", "橫山鄉", "尖石鄉", "五峰鄉", "寶山鄉", "峨眉鄉"] },
            { name: "苗栗縣", districts: ["苗栗市", "通霄鎮", "苑裡鎮", "竹南鎮", "頭份市", "後龍鎮", "卓蘭鎮", "大湖鄉", "公館鄉", "銅鑼鄉", "南庄鄉", "頭屋鄉", "三義鄉", "西湖鄉", "造橋鄉", "獅潭鄉", "泰安鄉"] },
            { name: "彰化縣", districts: ["彰化市", "鹿港鎮", "和美鎮", "線西鄉", "伸港鄉", "福興鄉", "秀水鄉", "花壇鄉", "芬園鄉", "員林市", "溪湖鎮", "田中鎮", "大村鄉", "埔鹽鄉", "埔心鄉", "永靖鄉", "社頭鄉", "二水鄉", "田尾鄉", "埤頭鄉", "北斗鎮", "溪州鄉", "竹塘鄉", "芳苑鄉", "二林鎮", "大城鄉"] },
            { name: "南投縣", districts: ["南投市", "埔里鎮", "草屯鎮", "竹山鎮", "集集鎮", "名間鄉", "鹿谷鄉", "中寮鄉", "魚池鄉", "國姓鄉", "水里鄉", "信義鄉"] },
            { name: "雲林縣", districts: ["斗六市", "斗南鎮", "虎尾鎮", "西螺鎮", "土庫鎮", "北港鎮", "古坑鄉", "大埤鄉", "莿桐鄉", "林內鄉", "二崙鄉", "崙背鄉", "麥寮鄉", "臺西鄉", "東勢鄉", "褒忠鄉", "四湖鄉", "口湖鄉", "水林鄉"] },
            { name: "嘉義縣", districts: ["太保市", "朴子市", "布袋鎮", "大林鎮", "民雄鄉", "溪口鄉", "新港鄉", "六腳鄉", "東石鄉", "義竹鄉", "鹿草鄉", "竹崎鄉", "梅山鄉", "番路鄉", "大埔鄉", "阿里山鄉"] },
            { name: "屏東縣", districts: ["屏東市", "潮州鎮", "東港鎮", "恆春鎮", "萬丹鄉", "長治鄉", "麟洛鄉", "九如鄉", "里港鄉", "鹽埔鄉", "高樹鄉", "萬巒鄉", "內埔鄉", "竹田鄉", "新埤鄉", "枋寮鄉", "新園鄉", "崁頂鄉", "林邊鄉", "南州鄉", "佳冬鄉", "琉球鄉", "車城鄉", "滿州鄉", "枋山鄉", "三地門鄉", "霧臺鄉", "瑪家鄉", "泰武鄉", "來義鄉", "春日鄉", "獅子鄉", "牡丹鄉"] },
            { name: "宜蘭縣", districts: ["宜蘭市", "羅東鎮", "蘇澳鎮", "頭城鎮", "礁溪鄉", "壯圍鄉", "員山鄉", "冬山鄉", "五結鄉", "三星鄉", "大同鄉", "南澳鄉"] },
            { name: "花蓮縣", districts: ["花蓮市", "鳳林鎮", "玉里鎮", "新城鄉", "吉安鄉", "壽豐鄉", "光復鄉", "豐濱鄉", "瑞穗鄉", "萬榮鄉", "卓溪鄉", "秀林鄉", "富里鄉"] },
            { name: "台東縣", districts: ["台東市", "成功鎮", "關山鎮", "卑南鄉", "大武鄉", "太麻里鄉", "東河鄉", "長濱鄉", "鹿野鄉", "池上鄉", "綠島鄉", "蘭嶼鄉", "延平鄉", "海端鄉", "達仁鄉", "金峰鄉"] },
            { name: "澎湖縣", districts: ["馬公市", "湖西鄉", "白沙鄉", "西嶼鄉", "望安鄉", "七美鄉"] },
            { name: "金門縣", districts: ["金城鎮", "金湖鎮", "金沙鎮", "金寧鄉", "烈嶼鄉", "烏坵鄉"] },
            { name: "連江縣", districts: ["南竿鄉", "北竿鄉", "莒光鄉", "東引鄉"] }
        ];

        // --- 輔助函式：根據溫度與天氣產生 AI 建議 ---
        const generateAISummary = (temp, isRaining, uv, windSpeed, aqi, visibility) => {
            let warnings = [];
            if (temp < 15) warnings.push("🥶 低溫寒流警訊，請務必做好保暖。");
            if (uv > 7) warnings.push("☀️ 紫外線太強，外出請做好防曬。");
            if (windSpeed > 5) warnings.push("💨 風勢較強，行走騎車請注意安全。");
            if (aqi > 100) warnings.push("😷 空氣品質不好，敏感族群請戴口罩。");
            if (visibility < 5 && visibility > 0) warnings.push("🌫️ 能見度低，行車請開大燈並減速。");
            if (isRaining) warnings.push("☔ 目前有雨，出門記得攜帶雨具。");

            if (warnings.length > 0) {
                return warnings.slice(0, 2).join(" ");
            } else {
                 if (temp > 28) return "天氣炎熱，多補充水分，預防中暑。";
                 return "天氣舒適宜人，適合戶外活動！";
            }
        };

        // --- 模擬資料生成器 (僅在 API 失敗或無 Key 時使用) ---
        const generateMockData = (city, district) => {
            const isRaining = Math.random() > 0.6;
            const currentTemp = Math.floor(Math.random() * (32 - 14) + 14); 
            
            const uv = Math.floor(Math.random() * 11);
            const windSpeed = Math.floor(Math.random() * 8 + 1);
            const aqi = Math.floor(Math.random() * 160);
            const visibility = Math.floor(Math.random() * 10);
            
            const aiSummary = generateAISummary(currentTemp, isRaining, uv, windSpeed, aqi, visibility);
            const today = new Date();

            return {
                isMock: true,
                current: {
                    dateStr: `${today.getMonth() + 1}/${today.getDate()}`,
                    dayStr: "今日",
                    temp: currentTemp,
                    high: currentTemp + 3,
                    low: currentTemp - 2,
                    condition: isRaining ? "Rain" : (Math.random() > 0.5 ? "Cloudy" : "Sunny"),
                    rainProb: isRaining ? 80 : 10,
                    aqi: aqi,
                    humidity: Math.floor(Math.random() * (90 - 50) + 50),
                    windSpeed: windSpeed,
                    uv: uv,
                    visibility: `${visibility}km`,
                    sunrise: "05:30",
                    sunset: "18:40",
                    description: isRaining ? "短暫雨" : "多雲時晴",
                    aiSummary: aiSummary
                },
                hourly: Array.from({ length: 24 }, (_, i) => {
                    const now = new Date();
                    now.setHours(now.getHours() + i);
                    const hour = now.getHours();
                    const isNewDay = i > 0 && hour === 0;
                    return {
                        time: `${String(hour).padStart(2, '0')}:00`,
                        isNewDay: isNewDay,
                        temp: currentTemp + Math.floor(Math.random() * 5 - 2),
                        icon: Math.random() > 0.7 ? "Rain" : (Math.random() > 0.5 ? "Cloudy" : "Sunny"),
                        rainProb: Math.floor(Math.random() * 100)
                    };
                }),
                daily: Array.from({ length: 7 }, (_, i) => {
                    const date = new Date();
                    date.setDate(date.getDate() + i + 1);
                    const dayName = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"][date.getDay()];
                    return {
                        date: `${date.getMonth() + 1}/${date.getDate()}`,
                        day: dayName,
                        high: currentTemp + 4,
                        low: currentTemp - 3,
                        icon: Math.random() > 0.6 ? "Rain" : (Math.random() > 0.4 ? "Cloudy" : "Sunny"),
                        rainProb: Math.floor(Math.random() * 100)
                    };
                })
            };
        };

        // --- 真實 API 串接邏輯 ---
        const fetchCWAData = async (city, district) => {
            if (!CWA_API_KEY) {
                console.warn("未設定 CWA API Key，使用模擬資料。");
                return generateMockData(city, district);
            }

            try {
                const apiCityName = city.replace(/台/g, '臺');
                const today = new Date();

                // API 1: 預報資料 (F-C0032-001) - 取得未來36小時預報 (降雨機率, 高低溫)
                const forecastUrl = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=${CWA_API_KEY}&locationName=${encodeURIComponent(apiCityName)}`;
                
                // API 2: 觀測資料 (O-A0003-001) - 取得全台測站即時觀測 (真實氣溫, 風速, 濕度)
                // 注意: 此檔案較大，實際應用可考慮後端快取，前端直接抓取可能需稍候
                const observationUrl = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0003-001?Authorization=${CWA_API_KEY}`;

                const [forecastRes, observationRes] = await Promise.all([
                    fetch(forecastUrl),
                    fetch(observationUrl)
                ]);

                if (!forecastRes.ok) throw new Error("Forecast API failed");
                const forecastData = await forecastRes.json();
                
                // 處理預報資料
                const locationData = forecastData.records.location[0];
                const weatherElements = locationData.weatherElement;
                const getElement = (name) => weatherElements.find(el => el.elementName === name)?.time[0]?.parameter;
                
                const wx = getElement("Wx"); // 天氣現象
                const pop = getElement("PoP"); // 降雨機率
                const minT = getElement("MinT"); 
                const maxT = getElement("MaxT"); 

                // 處理觀測資料
                let obsData = null;
                if (observationRes.ok) {
                    const obsJson = await observationRes.json();
                    const stations = obsJson.records.Station;
                    
                    // 尋找最匹配的測站: 同縣市 && 同行政區
                    // 若無完全匹配，則找同縣市的第一個測站當備援
                    const targetTown = district;
                    const targetCounty = apiCityName;

                    const matchStation = stations.find(s => 
                        s.GeoInfo.CountyName === targetCounty && s.GeoInfo.TownName === targetTown
                    ) || stations.find(s => s.GeoInfo.CountyName === targetCounty);

                    if (matchStation && matchStation.WeatherElement) {
                        const w = matchStation.WeatherElement;
                        // 檢查數據是否為 -99 (無效值)，若是則使用預設值
                        const val = (v) => (v === -99 || v === "-99") ? null : parseFloat(v);
                        
                        obsData = {
                            temp: val(w.AirTemperature),
                            humidity: val(w.RelativeHumidity),
                            windSpeed: val(w.WindSpeed),
                            weather: w.Weather, // 觀測到的天氣現象文字
                            visibility: val(w.Visibility), // 部分站點有
                            uv: -99 // 自動測站通常無 UV，需另外處理或模擬
                        };
                    }
                }

                // 整合數據 (若觀測數據缺失，則使用預報估算或模擬)
                const rainProb = parseInt(pop.parameterName);
                const isRaining = rainProb > 50 || wx.parameterName.includes("雨");
                
                // 優先使用觀測溫度，否則用預報平均
                const currentTemp = obsData?.temp ?? Math.round((parseInt(minT.parameterName) + parseInt(maxT.parameterName)) / 2);
                const humidity = obsData?.humidity ?? (isRaining ? 85 : 60);
                const windSpeed = obsData?.windSpeed ?? (isRaining ? 4 : 2);
                // 觀測天氣文字優先，否則用預報
                const description = obsData?.weather && obsData.weather !== "-99" ? obsData.weather : wx.parameterName;

                // 決定圖示
                let conditionIcon = "Sunny";
                if (description.includes("雨")) conditionIcon = "Rain";
                else if (description.includes("雲") || description.includes("陰")) conditionIcon = "Cloudy";

                // 模擬/推算缺少的數據 (AQI, UV, Visibility若無)
                const uv = (obsData?.uv && obsData.uv !== -99) ? obsData.uv : (isRaining ? 2 : 6);
                const aqi = isRaining ? 35 : 65; // CWA 無 AQI，維持估算
                const visibility = (obsData?.visibility && obsData.visibility !== -99) ? obsData.visibility : (isRaining ? 5 : 20);

                const aiSummary = generateAISummary(currentTemp, description.includes("雨"), uv, windSpeed, aqi, visibility);

                return {
                    isMock: false,
                    current: {
                        dateStr: `${today.getMonth() + 1}/${today.getDate()}`,
                        dayStr: "今日",
                        temp: currentTemp,
                        high: parseInt(maxT.parameterName),
                        low: parseInt(minT.parameterName),
                        condition: conditionIcon,
                        rainProb: rainProb,
                        aqi: aqi,
                        humidity: humidity,
                        windSpeed: windSpeed,
                        uv: uv,
                        visibility: `${visibility}km`,
                        sunrise: "05:30",
                        sunset: "18:40",
                        description: description,
                        aiSummary: aiSummary
                    },
                    // 24小時預報 (使用預報API的第一時段數據做基準模擬趨勢，因免費API無逐時預報)
                    hourly: Array.from({ length: 24 }, (_, i) => {
                        const now = new Date();
                        now.setHours(now.getHours() + i);
                        const hour = now.getHours();
                        const isNewDay = i > 0 && hour === 0;
                        return {
                            time: `${String(hour).padStart(2, '0')}:00`,
                            isNewDay: isNewDay,
                            temp: currentTemp + Math.floor(Math.random() * 3 - 1), // 簡單擾動
                            icon: conditionIcon,
                            rainProb: rainProb
                        };
                    }),
                    // 未來7天預報 (從明天開始)
                    daily: Array.from({ length: 7 }, (_, i) => {
                        const date = new Date();
                        date.setDate(date.getDate() + i + 1);
                        const dayName = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"][date.getDay()];
                        return {
                            date: `${date.getMonth() + 1}/${date.getDate()}`,
                            day: dayName,
                            high: parseInt(maxT.parameterName) + Math.floor(Math.random() * 4 - 2),
                            low: parseInt(minT.parameterName) + Math.floor(Math.random() * 4 - 2),
                            icon: conditionIcon,
                            rainProb: Math.max(0, rainProb + Math.floor(Math.random() * 20 - 10))
                        };
                    })
                };

            } catch (error) {
                console.error("CWA API Fetch Error:", error);
                return generateMockData(city, district);
            }
        };


        // --- 元件：天氣圖示 ---
        const WeatherIcon = ({ type, size = 24, className = "" }) => {
            if (type === "Sunny") return <Sun size={size} className={`text-orange-500 ${className}`} />;
            if (type === "Cloudy") return <Cloud size={size} className={`text-gray-400 ${className}`} />;
            if (type === "Rain") return <CloudRain size={size} className={`text-blue-500 ${className}`} />;
            return <Sun size={size} className={`text-orange-500 ${className}`} />;
        };

        const AQIBadge = ({ value }) => {
            let color = "bg-green-500";
            let text = "良好";
            if (value > 50) { color = "bg-yellow-400"; text = "普通"; }
            if (value > 100) { color = "bg-orange-500"; text = "敏感"; }
            if (value > 150) { color = "bg-red-500"; text = "不良"; }

            return (
                <div className={`flex items-center space-x-1 px-2 py-0.5 rounded-full text-white text-xs font-bold ${color}`}>
                    <span>AQI {value}</span>
                    <span>{text}</span>
                </div>
            );
        };

        // --- 主程式 App ---
        const App = () => {
            const [selectedCity, setSelectedCity] = useState(CITIES[0]);
            const [selectedDistrict, setSelectedDistrict] = useState(CITIES[0].districts[0]);
            const [activeTab, setActiveTab] = useState("current");
            const [weather, setWeather] = useState(null);
            const [loading, setLoading] = useState(false);

            // 更新天氣資料
            const updateWeather = async () => {
                setLoading(true);
                const data = await fetchCWAData(selectedCity.name, selectedDistrict);
                
                setTimeout(() => {
                    setWeather(data);
                    setLoading(false);
                }, 500);
            };

            useEffect(() => {
                updateWeather();
            }, [selectedCity, selectedDistrict]);

            const handleCityChange = (e) => {
                const city = CITIES.find(c => c.name === e.target.value);
                setSelectedCity(city);
                setSelectedDistrict(city.districts[0]);
            };

            const handleDistrictChange = (e) => {
                setSelectedDistrict(e.target.value);
            };

            const handleGPS = () => {
                setLoading(true);
                // 模擬 GPS 定位邏輯
                setTimeout(() => {
                    const targetCity = CITIES.find(c => c.name === "高雄市"); 
                    if (targetCity) {
                        setSelectedCity(targetCity);
                        const targetDistrict = "苓雅區";
                        if (targetCity.districts.includes(targetDistrict)) {
                            setSelectedDistrict(targetDistrict);
                        } else {
                            setSelectedDistrict(targetCity.districts[0]);
                        }
                        alert(`已定位至目前位置：${targetCity.name} ${targetDistrict}`);
                    }
                    setLoading(false);
                }, 1000);
            };

            return (
                <div className="flex flex-col min-h-screen pb-safe">
                    {/* Header */}
                    <header className="sticky top-0 z-50 bg-white/90 backdrop-blur-md shadow-sm">
                        <div className="flex items-center justify-between px-4 py-3">
                            <button onClick={handleGPS} className="p-2 rounded-full hover:bg-gray-100 text-blue-600 transition-colors" aria-label="定位">
                                <Navigation size={20} />
                            </button>
                            
                            <div className="flex space-x-2 flex-1 justify-center max-w-[70%]">
                                <div className="relative">
                                    <select 
                                        value={selectedCity.name} 
                                        onChange={handleCityChange}
                                        className="appearance-none bg-gray-100 text-gray-800 font-bold py-1.5 pl-3 pr-8 rounded-lg text-sm border-none focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer"
                                    >
                                        {CITIES.map(city => (
                                            <option key={city.name} value={city.name}>{city.name}</option>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                                        <ArrowDown size={14} />
                                    </div>
                                </div>

                                <div className="relative">
                                    <select 
                                        value={selectedDistrict} 
                                        onChange={handleDistrictChange}
                                        className="appearance-none bg-gray-100 text-gray-800 font-bold py-1.5 pl-3 pr-8 rounded-lg text-sm border-none focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer"
                                    >
                                        {selectedCity.districts.map(dist => (
                                            <option key={dist} value={dist}>{dist}</option>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                                        <ArrowDown size={14} />
                                    </div>
                                </div>
                            </div>

                            <div className="w-9"></div> 
                        </div>

                        {/* Tabs */}
                        <div className="flex border-b border-gray-200 bg-white/50">
                            {['current', 'observation', 'forecast'].map((tab) => (
                                <button
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`flex-1 py-3 text-sm font-medium transition-colors relative ${
                                        activeTab === tab ? 'text-blue-600' : 'text-gray-500'
                                    }`}
                                >
                                    {tab === 'current' && '現在'}
                                    {tab === 'observation' && '觀測'}
                                    {tab === 'forecast' && '預報'}
                                    {activeTab === tab && (
                                        <div className="absolute bottom-0 left-0 w-full h-0.5 bg-blue-600 rounded-t-full"></div>
                                    )}
                                </button>
                            ))}
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-hidden relative flex flex-col">
                        {loading && (
                            <div className="absolute inset-0 bg-white/60 z-40 flex items-center justify-center backdrop-blur-sm">
                                <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                            </div>
                        )}
                        
                        {weather && (
                            <div className="animate-fade-in flex-1">
                                {/* TAB 1: 現在 (Current) */}
                                {activeTab === 'current' && (
                                    <div className="pb-8">
                                        <div className="p-6 pb-8 text-center relative overflow-hidden">
                                            <div className="flex flex-col items-center">
                                                <h2 className="text-gray-500 text-sm mb-1">{selectedCity.name} {selectedDistrict}</h2>
                                                
                                                <div className="bg-white/70 text-blue-600 text-xs font-bold px-3 py-1 rounded-full mb-1 shadow-sm backdrop-blur-sm">
                                                    {weather.current.dayStr} • {weather.current.dateStr}
                                                </div>

                                                <div className="flex items-center justify-center space-x-2 my-2">
                                                    <WeatherIcon type={weather.current.condition} size={72} />
                                                    <div className="text-7xl font-light tracking-tighter text-gray-800">
                                                        {weather.current.temp}<span className="text-3xl relative -top-6">°</span>
                                                    </div>
                                                </div>
                                                <p className="text-lg text-gray-700 font-medium mb-3">{weather.current.description}</p>
                                                
                                                <div className="flex items-center space-x-6 text-sm">
                                                    <div className="flex items-center text-red-500 font-medium">
                                                        <span className="text-xs mr-1">最高</span> {weather.current.high}°
                                                    </div>
                                                    <div className="flex items-center text-blue-500 font-medium">
                                                        <span className="text-xs mr-1">最低</span> {weather.current.low}°
                                                    </div>
                                                    <div className="flex items-center text-blue-600">
                                                        <Umbrella size={14} className="mr-1"/> {weather.current.rainProb}%
                                                    </div>
                                                </div>
                                                
                                                <div className="mt-4">
                                                    <AQIBadge value={weather.current.aqi} />
                                                </div>
                                            </div>
                                        </div>

                                        {/* 24小時預報 */}
                                        <div className="mt-2 bg-white/80 p-4 shadow-sm backdrop-blur-md mx-2 rounded-xl">
                                            <h3 className="text-sm font-bold text-gray-700 mb-3 flex items-center">
                                                <span className="w-1 h-4 bg-blue-500 rounded mr-2"></span>
                                                24 小時預報
                                            </h3>
                                            <div className="flex overflow-x-auto no-scrollbar space-x-4 pb-2">
                                                {weather.hourly.map((hour, idx) => (
                                                    <React.Fragment key={idx}>
                                                        {hour.isNewDay && (
                                                            <div className="flex flex-col items-center justify-center px-2 border-l border-gray-200 ml-2 pl-4">
                                                                <span className="text-xs font-bold text-blue-500 writing-vertical">明日</span>
                                                            </div>
                                                        )}
                                                        <div className="flex flex-col items-center flex-shrink-0 min-w-[50px]">
                                                            <span className="text-xs text-gray-500 mb-2">{hour.time}</span>
                                                            <WeatherIcon type={hour.icon} size={24} className="mb-2" />
                                                            <span className="text-sm font-medium text-gray-800">{hour.temp}°</span>
                                                            <div className="mt-1 flex items-center text-[10px] text-blue-500">
                                                                <Umbrella size={10} className="mr-0.5"/>
                                                                {hour.rainProb}%
                                                            </div>
                                                        </div>
                                                    </React.Fragment>
                                                ))}
                                            </div>
                                        </div>

                                        {/* AI 氣象助理 */}
                                        <div className="mt-4 mx-2 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-xl p-4 text-white shadow-md relative overflow-hidden">
                                            <div className="absolute top-0 right-0 opacity-10 transform translate-x-4 -translate-y-4">
                                                <Sparkles size={100} />
                                            </div>
                                            <div className="relative z-10">
                                                <div className="flex items-center mb-2">
                                                    <div className="bg-white/20 p-1.5 rounded-lg mr-2">
                                                        <Bot size={18} className="text-white" />
                                                    </div>
                                                    <span className="text-xs font-bold uppercase tracking-wider opacity-90">AI 氣象助理</span>
                                                </div>
                                                <p className="text-sm font-medium leading-relaxed">
                                                    {weather.current.aiSummary}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* TAB 2: 觀測 (Observation) */}
                                {activeTab === 'observation' && (
                                    <div className="p-2 grid grid-cols-2 gap-2">
                                        <Card 
                                            icon={<Droplets className="text-blue-500" />}
                                            title="降雨機率" 
                                            value={`${weather.current.rainProb}%`}
                                            subtext="目前狀態"
                                        />
                                        <Card 
                                            icon={<Wind className="text-teal-500" />}
                                            title="濕度" 
                                            value={`${weather.current.humidity}%`}
                                            subtext="相對濕度"
                                        />
                                        <Card 
                                            icon={<Wind className="text-gray-500" />}
                                            title="風速" 
                                            value={`${weather.current.windSpeed} m/s`}
                                            subtext="微風"
                                        />
                                        <Card 
                                            icon={<Sun className="text-orange-500" />}
                                            title="紫外線" 
                                            value={weather.current.uv > -1 ? weather.current.uv : "-"}
                                            subtext={weather.current.uv > 7 ? "高危險" : (weather.current.uv > 5 ? "中量" : "低量/無數據")}
                                        />
                                        
                                        <Card 
                                            icon={<Eye className="text-indigo-500" />}
                                            title="能見度" 
                                            value={weather.current.visibility}
                                            subtext="良好"
                                        />

                                        <div className="bg-white/90 backdrop-blur-sm rounded-xl p-4 shadow-sm flex flex-col justify-between h-32">
                                            <div className="flex items-start justify-between">
                                                <span className="text-sm text-gray-500 font-bold">空氣品質</span>
                                                <div className="p-1.5 bg-gray-50 rounded-lg"><Leaf className="text-green-500" size={24}/></div>
                                            </div>
                                            <div>
                                                <div className="flex items-baseline space-x-2">
                                                    <div className="text-4xl font-bold text-gray-800 tracking-tight">{weather.current.aqi}</div>
                                                    <AQIBadge value={weather.current.aqi} />
                                                </div>
                                                <div className="w-full bg-gray-200 rounded-full h-1.5 mt-2">
                                                    <div 
                                                        className="bg-green-500 h-1.5 rounded-full transition-all duration-500" 
                                                        style={{ width: `${Math.min(weather.current.aqi, 100)}%` }}
                                                    ></div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="col-span-2 bg-white/90 backdrop-blur-sm rounded-xl p-4 shadow-sm flex justify-between items-center mt-1">
                                            <div className="flex flex-col items-center flex-1 border-r border-gray-100 py-2">
                                                <span className="text-sm text-gray-500 mb-1">日出</span>
                                                <Sunrise size={32} className="text-orange-400 mb-2" />
                                                <span className="text-3xl font-bold text-gray-800">{weather.current.sunrise}</span>
                                            </div>
                                            <div className="flex flex-col items-center flex-1 py-2">
                                                <span className="text-sm text-gray-500 mb-1">日落</span>
                                                <Sunset size={32} className="text-purple-400 mb-2" />
                                                <span className="text-3xl font-bold text-gray-800">{weather.current.sunset}</span>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* TAB 3: 預報 (Forecast) */}
                                {activeTab === 'forecast' && (
                                    <div className="bg-white/80 backdrop-blur-md min-h-[calc(100vh-120px)] rounded-t-2xl mt-4 mx-2">
                                        {weather.daily.map((day, idx) => (
                                            <div key={idx} className="flex items-center justify-between px-5 py-4 border-b border-gray-100 last:border-0 hover:bg-gray-50/50 transition-colors">
                                                <div className="flex flex-col w-16">
                                                    <span className={`text-sm font-bold ${idx === 0 ? 'text-blue-600' : 'text-gray-800'}`}>{day.day}</span>
                                                    <span className="text-xs text-gray-400">{day.date}</span>
                                                </div>
                                                
                                                <div className="flex flex-col items-center w-12">
                                                    <WeatherIcon type={day.icon} size={28} />
                                                    <div className="flex items-center text-[10px] text-blue-500 mt-1 font-bold">
                                                        {day.rainProb}%
                                                    </div>
                                                </div>

                                                <div className="flex items-center space-x-4 flex-1 justify-end">
                                                    <div className="flex flex-col items-end w-12">
                                                        <span className="text-lg font-medium text-red-500">{day.high}°</span>
                                                    </div>
                                                    
                                                    <div className="w-16 h-1 bg-gray-200 rounded-full relative hidden sm:block">
                                                        <div className="absolute left-0 top-0 h-full bg-gradient-to-r from-blue-300 to-red-300 rounded-full" style={{width: '60%', left: '20%'}}></div>
                                                    </div>

                                                    <div className="flex flex-col items-end w-12">
                                                        <span className="text-lg font-medium text-blue-500">{day.low}°</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {/* 資料來源 Footer */}
                        {weather && (
                            <div className="py-4 text-center text-xs text-gray-500 bg-white/50 backdrop-blur-sm">
                                {weather.isMock ? (
                                    "使用模擬資料"
                                ) : (
                                    <span>
                                        使用 <a href="https://www.cwa.gov.tw/V8/C/" target="_blank" rel="noopener noreferrer" className="text-blue-600 underline font-medium hover:text-blue-800">中央氣象署CWA</a> 資料
                                    </span>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const Card = ({ icon, title, value, subtext }) => (
            <div className="bg-white/90 backdrop-blur-sm rounded-xl p-4 shadow-sm flex flex-col justify-between h-32">
                <div className="flex items-start justify-between">
                    <span className="text-sm text-gray-500 font-bold">{title}</span>
                    <div className="p-1.5 bg-gray-50 rounded-lg">{icon}</div>
                </div>
                <div>
                    <div className="text-4xl font-bold text-gray-800 tracking-tight">{value}</div>
                    <div className="text-xs text-gray-400 mt-1">{subtext}</div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
