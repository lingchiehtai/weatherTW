<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 自定義字型與樣式優化 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f0f2f5;
            -webkit-tap-highlight-color: transparent;
        }

        /* 隱藏 Scrollbar 但保持功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 模擬手機外框在桌機上 */
        #root {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: #ffffff;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Yahoo JP 風格的漸層背景 */
        .bg-yahoo-blue {
            background: linear-gradient(180deg, #4a90e2 0%, #ffffff 100%);
        }
        .bg-yahoo-gray {
            background: #f5f6f7;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CWA API 設定 ---
        // 請在此填入您的中央氣象署 API Key
        const CWA_API_KEY = ""; 

        // --- 內嵌 SVG 圖標元件 (解決 Lucide CDN 相容性問題) ---
        
        const Icon = ({ children, size = 24, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {children}
            </svg>
        );

        const Navigation = (p) => <Icon {...p}><polygon points="3 11 22 2 13 21 11 13 3 11"/></Icon>;
        const ArrowDown = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9"/></Icon>;
        const Sun = (p) => <Icon {...p}><circle cx="12" cy="12" r="5"/><path d="M12 1v2"/><path d="M12 21v2"/><path d="M4.22 4.22l1.42 1.42"/><path d="M18.36 18.36l1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="M4.22 19.78l1.42-1.42"/><path d="M18.36 5.64l1.42-1.42"/></Icon>;
        const Cloud = (p) => <Icon {...p}><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></Icon>;
        const CloudRain = (p) => <Icon {...p}><path d="M16 13v8"/><path d="M8 13v8"/><path d="M12 15v8"/><path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/></Icon>;
        const Umbrella = (p) => <Icon {...p}><path d="M23 12a11.05 11.05 0 0 0-22 0zm-5 7a3 3 0 0 1-6 0v-7"/></Icon>;
        const Wind = (p) => <Icon {...p}><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></Icon>;
        const Droplets = (p) => <Icon {...p}><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.8-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/></Icon>;
        const Eye = (p) => <Icon {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></Icon>;
        const Sunrise = (p) => <Icon {...p}><path d="M12 2v8"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m8 6 4-4 4 4"/><path d="M16 18a4 4 0 0 0-8 0"/></Icon>;
        const Sunset = (p) => <Icon {...p}><path d="M12 10V2"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m16 6-4 4-4-4"/><path d="M16 18a4 4 0 0 0-8 0"/></Icon>;
        const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M9 3v4"/><path d="M3 5h4"/><path d="M3 9h4"/></Icon>;
        const Bot = (p) => <Icon {...p}><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></Icon>;

        // --- 資料設定 (模擬 CWA API 回傳結構與縣市資料) ---

        const CITIES = [
            { name: "臺北市", districts: ["信義區", "大安區", "中正區", "士林區", "北投區"] },
            { name: "新北市", districts: ["板橋區", "新莊區", "中和區", "淡水區", "林口區"] },
            { name: "桃園市", districts: ["桃園區", "中壢區", "蘆竹區", "龜山區"] },
            { name: "臺中市", districts: ["西屯區", "北屯區", "南屯區", "豐原區"] },
            { name: "臺南市", districts: ["安平區", "東區", "永康區", "中西區"] },
            { name: "高雄市", districts: ["苓雅區", "左營區", "鼓山區", "前鎮區", "鳳山區"] },
            { name: "基隆市", districts: ["仁愛區", "信義區"] },
            { name: "新竹市", districts: ["東區", "北區"] },
            { name: "嘉義市", districts: ["東區", "西區"] },
            { name: "宜蘭縣", districts: ["宜蘭市", "羅東鎮"] },
            { name: "花蓮縣", districts: ["花蓮市", "吉安鄉"] },
            { name: "臺東縣", districts: ["臺東市", "卑南鄉"] },
            { name: "南投縣", districts: ["南投市", "埔里鎮"] },
            { name: "雲林縣", districts: ["斗六市", "虎尾鎮"] },
            { name: "彰化縣", districts: ["彰化市", "員林市"] },
            { name: "屏東縣", districts: ["屏東市", "恆春鎮"] },
            { name: "苗栗縣", districts: ["苗栗市", "竹南鎮"] },
        ];

        // 模擬氣象資料生成器 (當沒有 API Key 或呼叫失敗時使用)
        const generateMockData = (city, district) => {
            const isRaining = Math.random() > 0.6;
            const currentTemp = Math.floor(Math.random() * (32 - 14) + 14); // 範圍調整以利測試低溫
            
            // 數據隨機化
            const uv = Math.floor(Math.random() * 11);
            const windSpeed = Math.floor(Math.random() * 8 + 1);
            const aqi = Math.floor(Math.random() * 160);
            const visibility = Math.floor(Math.random() * 10); // km

            // AI 助理訊息邏輯 - 更新版
            let warnings = [];
            if (currentTemp < 15) warnings.push("🥶 低溫寒流警訊，請務必做好保暖。");
            if (uv > 7) warnings.push("☀️ 紫外線太強，外出請做好防曬。");
            if (windSpeed > 5) warnings.push("💨 風勢較強，行走騎車請注意安全。");
            if (aqi > 100) warnings.push("😷 空氣品質不好，敏感族群請戴口罩。");
            if (visibility < 5) warnings.push("🌫️ 能見度低，行車請開大燈並減速。");
            if (isRaining) warnings.push("☔ 目前有雨，出門記得攜帶雨具。");

            let aiSummary = "";
            if (warnings.length > 0) {
                // 取前兩項重要的，避免文字過多
                aiSummary = warnings.slice(0, 2).join(" ");
            } else {
                 if (currentTemp > 28) aiSummary = "天氣炎熱，多補充水分，預防中暑。";
                 else aiSummary = "天氣舒適宜人，適合戶外活動！";
            }

            const today = new Date();

            return {
                current: {
                    dateStr: `${today.getMonth() + 1}/${today.getDate()}`,
                    dayStr: "今日",
                    temp: currentTemp,
                    high: currentTemp + 3,
                    low: currentTemp - 2,
                    condition: isRaining ? "Rain" : (Math.random() > 0.5 ? "Cloudy" : "Sunny"),
                    rainProb: isRaining ? 80 : 10,
                    aqi: aqi,
                    humidity: Math.floor(Math.random() * (90 - 50) + 50),
                    windSpeed: windSpeed,
                    uv: uv,
                    visibility: `${visibility}km`,
                    sunrise: "05:30",
                    sunset: "18:40",
                    description: isRaining ? "短暫雨" : "多雲時晴",
                    aiSummary: aiSummary
                },
                hourly: Array.from({ length: 24 }, (_, i) => {
                    const now = new Date();
                    now.setHours(now.getHours() + i);
                    const hour = now.getHours();
                    const isNewDay = i > 0 && hour === 0; // 判斷是否跨日

                    return {
                        time: `${String(hour).padStart(2, '0')}:00`,
                        isNewDay: isNewDay,
                        temp: currentTemp + Math.floor(Math.random() * 5 - 2),
                        icon: Math.random() > 0.7 ? "Rain" : (Math.random() > 0.5 ? "Cloudy" : "Sunny"),
                        rainProb: Math.floor(Math.random() * 100)
                    };
                }),
                daily: Array.from({ length: 7 }, (_, i) => {
                    const date = new Date();
                    date.setDate(date.getDate() + i);
                    const dayName = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"][date.getDay()];
                    return {
                        date: `${date.getMonth() + 1}/${date.getDate()}`,
                        day: i === 0 ? "今日" : dayName,
                        high: currentTemp + 4,
                        low: currentTemp - 3,
                        icon: Math.random() > 0.6 ? "Rain" : (Math.random() > 0.4 ? "Cloudy" : "Sunny"),
                        rainProb: Math.floor(Math.random() * 100)
                    };
                })
            };
        };

        // --- CWA API Fetch Logic (範例骨架) ---
        const fetchCWAData = async (city, district) => {
            if (!CWA_API_KEY) {
                console.warn("未設定 CWA API Key，使用模擬資料。");
                return generateMockData(city, district);
            }

            try {
                // 這裡示範呼叫「一般天氣預報-今明36小時」API
                // 注意：實際 CWA API 需要處理複雜的 JSON 結構映射，且縣市名稱需對應 API 的 locationName
                // 為了專案穩定性，若 API 呼叫失敗或格式不符，會自動降級為模擬資料
                
                const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=${CWA_API_KEY}&locationName=${encodeURIComponent(city)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error("API Network response was not ok");
                
                const data = await response.json();
                console.log("CWA API Data:", data);

                // 備註：
                // 真實串接時，您需要解析 data.records.location[0].weatherElement
                // 並將 Wx (天氣現象), PoP (降雨機率), MinT/MaxT (氣溫) 轉換為本 App 的資料格式
                // 由於這需要數百行的解析代碼來處理各種 edge case，
                // 在此教學範例中，我們驗證 Key 有效後，暫時仍回傳模擬資料以保證 UI 完整呈現。
                // 您可以在此處加入真實的解析邏輯。
                
                return generateMockData(city, district); // 暫時回傳模擬資料

            } catch (error) {
                console.error("CWA API Fetch Error:", error);
                return generateMockData(city, district); // 發生錯誤時回退
            }
        };


        // --- 元件：天氣圖示 ---
        const WeatherIcon = ({ type, size = 24, className = "" }) => {
            if (type === "Sunny") return <Sun size={size} className={`text-orange-500 ${className}`} />;
            if (type === "Cloudy") return <Cloud size={size} className={`text-gray-400 ${className}`} />;
            if (type === "Rain") return <CloudRain size={size} className={`text-blue-500 ${className}`} />;
            return <Sun size={size} className={`text-orange-500 ${className}`} />;
        };

        // --- 元件：AQI 標籤 ---
        const AQIBadge = ({ value }) => {
            let color = "bg-green-500";
            let text = "良好";
            if (value > 50) { color = "bg-yellow-400"; text = "普通"; }
            if (value > 100) { color = "bg-orange-500"; text = "敏感"; }
            if (value > 150) { color = "bg-red-500"; text = "不良"; }

            return (
                <div className={`flex items-center space-x-1 px-2 py-0.5 rounded-full text-white text-xs font-bold ${color}`}>
                    <span>AQI {value}</span>
                    <span>{text}</span>
                </div>
            );
        };

        // --- 主程式 App ---
        const App = () => {
            const [selectedCity, setSelectedCity] = useState(CITIES[0]);
            const [selectedDistrict, setSelectedDistrict] = useState(CITIES[0].districts[0]);
            const [activeTab, setActiveTab] = useState("current");
            const [weather, setWeather] = useState(null);
            const [loading, setLoading] = useState(false);

            // 更新天氣資料
            const updateWeather = async () => {
                setLoading(true);
                // 如果有 Key 則嘗試呼叫，否則用模擬
                const data = await fetchCWAData(selectedCity.name, selectedDistrict);
                
                // 模擬一點延遲讓 loading 效果出現
                setTimeout(() => {
                    setWeather(data);
                    setLoading(false);
                }, 500);
            };

            useEffect(() => {
                updateWeather();
            }, [selectedCity, selectedDistrict]);

            const handleCityChange = (e) => {
                const city = CITIES.find(c => c.name === e.target.value);
                setSelectedCity(city);
                setSelectedDistrict(city.districts[0]);
            };

            const handleDistrictChange = (e) => {
                setSelectedDistrict(e.target.value);
            };

            const handleGPS = () => {
                setLoading(true);
                // 模擬 GPS 定位成功
                setTimeout(() => {
                    setSelectedCity(CITIES[5]); // 假設定位到高雄
                    setSelectedDistrict(CITIES[5].districts[0]);
                    alert("已定位至目前位置：高雄市 苓雅區");
                    setLoading(false);
                }, 1000);
            };

            return (
                <div className="flex flex-col min-h-screen pb-safe">
                    {/* Header: 固定在上方 */}
                    <header className="sticky top-0 z-50 bg-white shadow-sm">
                        <div className="flex items-center justify-between px-4 py-3">
                            <button onClick={handleGPS} className="p-2 rounded-full hover:bg-gray-100 text-blue-600 transition-colors" aria-label="定位">
                                <Navigation size={20} />
                            </button>
                            
                            <div className="flex space-x-2 flex-1 justify-center max-w-[70%]">
                                <div className="relative">
                                    <select 
                                        value={selectedCity.name} 
                                        onChange={handleCityChange}
                                        className="appearance-none bg-gray-100 text-gray-800 font-bold py-1.5 pl-3 pr-8 rounded-lg text-sm border-none focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer"
                                    >
                                        {CITIES.map(city => (
                                            <option key={city.name} value={city.name}>{city.name}</option>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                                        <ArrowDown size={14} />
                                    </div>
                                </div>

                                <div className="relative">
                                    <select 
                                        value={selectedDistrict} 
                                        onChange={handleDistrictChange}
                                        className="appearance-none bg-gray-100 text-gray-800 font-bold py-1.5 pl-3 pr-8 rounded-lg text-sm border-none focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer"
                                    >
                                        {selectedCity.districts.map(dist => (
                                            <option key={dist} value={dist}>{dist}</option>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                                        <ArrowDown size={14} />
                                    </div>
                                </div>
                            </div>

                            {/* 佔位用，保持平衡 */}
                            <div className="w-9"></div> 
                        </div>

                        {/* Tabs */}
                        <div className="flex border-b border-gray-200">
                            {['current', 'observation', 'forecast'].map((tab) => (
                                <button
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`flex-1 py-3 text-sm font-medium transition-colors relative ${
                                        activeTab === tab ? 'text-blue-600' : 'text-gray-500'
                                    }`}
                                >
                                    {tab === 'current' && '現在'}
                                    {tab === 'observation' && '觀測'}
                                    {tab === 'forecast' && '預報'}
                                    {activeTab === tab && (
                                        <div className="absolute bottom-0 left-0 w-full h-0.5 bg-blue-600 rounded-t-full"></div>
                                    )}
                                </button>
                            ))}
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 bg-gray-50 overflow-hidden relative">
                        {loading && (
                            <div className="absolute inset-0 bg-white/80 z-40 flex items-center justify-center">
                                <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                            </div>
                        )}
                        
                        {weather && (
                            <div className="animate-fade-in">
                                {/* TAB 1: 現在 (Current) */}
                                {activeTab === 'current' && (
                                    <div className="pb-8">
                                        {/* 目前天氣大卡片 */}
                                        <div className="bg-white p-6 pb-8 text-center relative overflow-hidden shadow-sm">
                                            <div className="flex flex-col items-center">
                                                <h2 className="text-gray-500 text-sm mb-1">{selectedCity.name} {selectedDistrict}</h2>
                                                
                                                {/* 日期與今日標示 */}
                                                <div className="bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1 rounded-full mb-1">
                                                    {weather.current.dayStr} • {weather.current.dateStr}
                                                </div>

                                                <div className="flex items-center justify-center space-x-2 my-2">
                                                    <WeatherIcon type={weather.current.condition} size={72} />
                                                    <div className="text-7xl font-light tracking-tighter text-gray-800">
                                                        {weather.current.temp}<span className="text-3xl relative -top-6">°</span>
                                                    </div>
                                                </div>
                                                <p className="text-lg text-gray-700 font-medium mb-3">{weather.current.description}</p>
                                                
                                                <div className="flex items-center space-x-6 text-sm">
                                                    <div className="flex items-center text-red-500 font-medium">
                                                        <span className="text-xs mr-1">最高</span> {weather.current.high}°
                                                    </div>
                                                    <div className="flex items-center text-blue-500 font-medium">
                                                        <span className="text-xs mr-1">最低</span> {weather.current.low}°
                                                    </div>
                                                    <div className="flex items-center text-blue-600">
                                                        <Umbrella size={14} className="mr-1"/> {weather.current.rainProb}%
                                                    </div>
                                                </div>
                                                
                                                <div className="mt-4">
                                                    <AQIBadge value={weather.current.aqi} />
                                                </div>
                                            </div>
                                        </div>

                                        {/* 24小時預報 */}
                                        <div className="mt-2 bg-white p-4 shadow-sm">
                                            <h3 className="text-sm font-bold text-gray-700 mb-3 flex items-center">
                                                <span className="w-1 h-4 bg-blue-500 rounded mr-2"></span>
                                                24 小時預報
                                            </h3>
                                            <div className="flex overflow-x-auto no-scrollbar space-x-4 pb-2">
                                                {weather.hourly.map((hour, idx) => (
                                                    <React.Fragment key={idx}>
                                                        {hour.isNewDay && (
                                                            <div className="flex flex-col items-center justify-center px-2 border-l border-gray-200 ml-2 pl-4">
                                                                <span className="text-xs font-bold text-blue-500 writing-vertical">明日</span>
                                                            </div>
                                                        )}
                                                        <div className="flex flex-col items-center flex-shrink-0 min-w-[50px]">
                                                            <span className="text-xs text-gray-500 mb-2">{hour.time}</span>
                                                            <WeatherIcon type={hour.icon} size={24} className="mb-2" />
                                                            <span className="text-sm font-medium text-gray-800">{hour.temp}°</span>
                                                            <div className="mt-1 flex items-center text-[10px] text-blue-500">
                                                                <Umbrella size={10} className="mr-0.5"/>
                                                                {hour.rainProb}%
                                                            </div>
                                                        </div>
                                                    </React.Fragment>
                                                ))}
                                            </div>
                                        </div>

                                        {/* AI 氣象助理 */}
                                        <div className="mt-2 mx-2 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-xl p-4 text-white shadow-md relative overflow-hidden">
                                            <div className="absolute top-0 right-0 opacity-10 transform translate-x-4 -translate-y-4">
                                                <Sparkles size={100} />
                                            </div>
                                            <div className="relative z-10">
                                                <div className="flex items-center mb-2">
                                                    <div className="bg-white/20 p-1.5 rounded-lg mr-2">
                                                        <Bot size={18} className="text-white" />
                                                    </div>
                                                    <span className="text-xs font-bold uppercase tracking-wider opacity-90">AI 氣象助理</span>
                                                </div>
                                                <p className="text-sm font-medium leading-relaxed">
                                                    {weather.current.aiSummary}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* TAB 2: 觀測 (Observation) */}
                                {activeTab === 'observation' && (
                                    <div className="p-2 grid grid-cols-2 gap-2">
                                        <Card 
                                            icon={<Droplets className="text-blue-500" />}
                                            title="降雨機率" 
                                            value={`${weather.current.rainProb}%`}
                                            subtext="目前狀態"
                                        />
                                        <Card 
                                            icon={<Wind className="text-teal-500" />}
                                            title="濕度" 
                                            value={`${weather.current.humidity}%`}
                                            subtext="相對濕度"
                                        />
                                        <Card 
                                            icon={<Wind className="text-gray-500" />}
                                            title="風速" 
                                            value={`${weather.current.windSpeed} m/s`}
                                            subtext="微風"
                                        />
                                        <Card 
                                            icon={<Sun className="text-orange-500" />}
                                            title="紫外線" 
                                            value={weather.current.uv}
                                            subtext={weather.current.uv > 7 ? "高危險" : (weather.current.uv > 5 ? "中量" : "低量")}
                                        />
                                        <Card 
                                            icon={<Eye className="text-indigo-500" />}
                                            title="能見度" 
                                            value={weather.current.visibility}
                                            subtext="良好"
                                        />
                                        <div className="col-span-2 bg-white rounded-xl p-4 shadow-sm flex justify-between items-center">
                                            <div className="flex flex-col items-center flex-1 border-r border-gray-100">
                                                <span className="text-xs text-gray-500 mb-1">日出</span>
                                                <Sunrise size={24} className="text-orange-400 mb-1" />
                                                <span className="text-lg font-bold text-gray-800">{weather.current.sunrise}</span>
                                            </div>
                                            <div className="flex flex-col items-center flex-1">
                                                <span className="text-xs text-gray-500 mb-1">日落</span>
                                                <Sunset size={24} className="text-purple-400 mb-1" />
                                                <span className="text-lg font-bold text-gray-800">{weather.current.sunset}</span>
                                            </div>
                                        </div>
                                        
                                        <div className="col-span-2 bg-white rounded-xl p-4 shadow-sm">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-sm text-gray-500 font-bold">空氣品質</span>
                                                <AQIBadge value={weather.current.aqi} />
                                            </div>
                                            <div className="w-full bg-gray-200 rounded-full h-2.5">
                                                <div 
                                                    className="bg-green-500 h-2.5 rounded-full transition-all duration-500" 
                                                    style={{ width: `${Math.min(weather.current.aqi, 100)}%` }}
                                                ></div>
                                            </div>
                                            <p className="text-xs text-gray-400 mt-2 text-right">AQI 指數: {weather.current.aqi}</p>
                                        </div>
                                    </div>
                                )}

                                {/* TAB 3: 預報 (Forecast) */}
                                {activeTab === 'forecast' && (
                                    <div className="bg-white min-h-[calc(100vh-120px)]">
                                        {weather.daily.map((day, idx) => (
                                            <div key={idx} className="flex items-center justify-between px-5 py-4 border-b border-gray-100 last:border-0 hover:bg-gray-50 transition-colors">
                                                <div className="flex flex-col w-16">
                                                    <span className={`text-sm font-bold ${idx === 0 ? 'text-blue-600' : 'text-gray-800'}`}>{day.day}</span>
                                                    <span className="text-xs text-gray-400">{day.date}</span>
                                                </div>
                                                
                                                <div className="flex flex-col items-center w-12">
                                                    <WeatherIcon type={day.icon} size={28} />
                                                    <div className="flex items-center text-[10px] text-blue-500 mt-1 font-bold">
                                                        {day.rainProb}%
                                                    </div>
                                                </div>

                                                <div className="flex items-center space-x-4 flex-1 justify-end">
                                                    <div className="flex flex-col items-end w-12">
                                                        <span className="text-lg font-medium text-red-500">{day.high}°</span>
                                                    </div>
                                                    
                                                    {/* 視覺化的溫度條 (簡化版) */}
                                                    <div className="w-16 h-1 bg-gray-200 rounded-full relative hidden sm:block">
                                                        <div className="absolute left-0 top-0 h-full bg-gradient-to-r from-blue-300 to-red-300 rounded-full" style={{width: '60%', left: '20%'}}></div>
                                                    </div>

                                                    <div className="flex flex-col items-end w-12">
                                                        <span className="text-lg font-medium text-blue-500">{day.low}°</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        // --- 小元件: 觀測卡片 ---
        const Card = ({ icon, title, value, subtext }) => (
            <div className="bg-white rounded-xl p-4 shadow-sm flex flex-col justify-between h-32">
                <div className="flex items-start justify-between">
                    <span className="text-sm text-gray-500 font-bold">{title}</span>
                    <div className="p-1.5 bg-gray-50 rounded-lg">{icon}</div>
                </div>
                <div>
                    <div className="text-2xl font-bold text-gray-800 tracking-tight">{value}</div>
                    <div className="text-xs text-gray-400 mt-0.5">{subtext}</div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
