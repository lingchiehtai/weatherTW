<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台灣氣象 - Taiwan Weather</title>
    <!-- Tailwind CSS (用於快速切版) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome (用於圖標) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 全局設定 */
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f2f5; /* 背景灰，模擬手機桌面背景 */
            -webkit-tap-highlight-color: transparent;
        }

        /* 模擬手機 App 容器 */
        #app-container {
            max-width: 480px; /* 手機寬度限制 */
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }

        /* 隱藏捲軸但保留功能 */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Yahoo! JP 風格配色變數 */
        :root {
            --y-red: #e60033;
            --y-blue: #0073e6;
            --y-gray: #666666;
            --y-orange: #ff9900;
        }

        .text-y-red { color: var(--y-red); }
        .text-y-blue { color: var(--y-blue); }
        .bg-y-red { background-color: var(--y-red); }
        
        /* 頁籤切換動畫 */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 底部導覽列樣式 (類似 Yahoo App 的頁首下方導覽) */
        .nav-item.active {
            color: #000;
            font-weight: 700;
            border-bottom: 3px solid var(--y-red);
        }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.8);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
    </style>
</head>
<body class="text-gray-800">

    <div id="app-container">
        
        <!-- Loading Overlay -->
        <div id="loading-overlay">
            <i class="fa-solid fa-circle-notch fa-spin text-y-blue text-4xl mb-2"></i>
            <span class="text-xs text-gray-500 font-bold">資料更新中...</span>
        </div>

        <!-- 1. Header & Location (Fixed) -->
        <header class="sticky top-0 z-50 bg-white border-b border-gray-100">
            <div class="flex items-center justify-between px-4 py-3">
                <div class="flex items-center space-x-2" id="location-trigger">
                    <i class="fa-solid fa-location-dot text-y-red text-lg"></i>
                    <!-- 模擬下拉選單 -->
                    <select id="location-select" class="text-lg font-bold bg-transparent border-none outline-none appearance-none cursor-pointer pr-4">
                        <option value="Taipei">臺北市</option>
                        <option value="NewTaipei">新北市</option>
                        <option value="Kaohsiung" selected>高雄市</option>
                        <option value="Taichung">臺中市</option>
                        <option value="Tainan">臺南市</option>
                        <option value="Hualien">花蓮縣</option>
                    </select>
                    <i class="fa-solid fa-chevron-down text-xs text-gray-400 -ml-2 pointer-events-none"></i>
                </div>
                
                <button onclick="getUserLocation()" class="p-2 rounded-full active:bg-gray-100 transition">
                    <i class="fa-solid fa-crosshairs text-gray-500"></i>
                </button>
            </div>

            <!-- Navigation Tabs -->
            <nav class="flex justify-around text-gray-500 text-sm border-b border-gray-200">
                <button onclick="switchTab('now')" id="nav-now" class="nav-item active flex-1 py-3 text-center transition-all">
                    現在
                </button>
                <button onclick="switchTab('observation')" id="nav-observation" class="nav-item flex-1 py-3 text-center transition-all">
                    觀測
                </button>
                <button onclick="switchTab('forecast')" id="nav-forecast" class="nav-item flex-1 py-3 text-center transition-all">
                    預報
                </button>
            </nav>
        </header>

        <!-- Main Content Area -->
        <main class="pb-10 relative">

            <!-- TAB 1: 現在 (Now) -->
            <section id="tab-now" class="tab-content active px-4 pt-6">
                <!-- Main Temperature Area -->
                <div class="text-center mb-6">
                    <div class="text-gray-500 text-sm mb-1" id="current-date">--月--日</div>
                    <div class="flex justify-center items-start">
                        <span class="text-8xl font-light tracking-tighter" id="current-temp">--</span>
                        <span class="text-3xl mt-4 font-light">°C</span>
                    </div>
                    
                    <div class="flex justify-center items-center gap-4 mt-2 text-lg font-medium">
                        <span class="text-y-red">H: <span id="today-high">--</span>°</span>
                        <span class="text-gray-300">|</span>
                        <span class="text-y-blue">L: <span id="today-low">--</span>°</span>
                    </div>

                    <div class="flex justify-center items-center gap-3 mt-4">
                        <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1">
                            <i class="fa-solid fa-umbrella"></i> <span id="current-rain">--%</span>
                        </span>
                        <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1">
                            AQI <span id="current-aqi">-- 良好</span>
                        </span>
                    </div>
                </div>

                <!-- AI Weather Assistant -->
                <div class="mt-8 bg-gradient-to-r from-blue-50 to-indigo-50 rounded-2xl p-4 border border-blue-100 shadow-sm flex items-start gap-3">
                    <div class="bg-white p-2 rounded-full shadow-sm text-blue-500">
                        <i class="fa-solid fa-robot"></i>
                    </div>
                    <div>
                        <h3 class="text-xs font-bold text-blue-800 mb-1">AI 氣象助理</h3>
                        <p class="text-sm text-gray-700 font-medium leading-relaxed" id="ai-summary">
                            <!-- JS will inject text here -->
                            資料讀取中...
                        </p>
                    </div>
                </div>
                
                <!-- Advertisement placeholder (simulating Yahoo style) -->
                <div class="mt-8 h-24 bg-gray-100 rounded-lg flex items-center justify-center text-gray-300 text-xs border border-dashed border-gray-300">
                    廣告區域
                </div>
            </section>


            <!-- TAB 2: 觀測 (Observation) -->
            <section id="tab-observation" class="tab-content px-4 pt-6">
                <h2 class="text-lg font-bold mb-4 border-l-4 border-y-red pl-3">詳細觀測數據</h2>
                
                <div class="grid grid-cols-2 gap-3">
                    <!-- Cards -->
                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between h-32">
                        <div class="text-gray-400 text-xs"><i class="fa-solid fa-droplet text-blue-400 mr-1"></i> 降雨機率</div>
                        <div class="text-2xl font-bold mt-1" id="obs-rain-prob">--<span class="text-sm">%</span></div>
                        <div class="text-xs text-gray-500">氣象署預報</div>
                    </div>

                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between h-32">
                        <div class="text-gray-400 text-xs"><i class="fa-solid fa-water text-cyan-400 mr-1"></i> 相對濕度</div>
                        <div class="text-2xl font-bold mt-1" id="obs-humidity">--<span class="text-sm">%</span></div>
                        <div class="text-xs text-gray-500">即時觀測</div>
                    </div>

                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between h-32">
                        <div class="text-gray-400 text-xs"><i class="fa-solid fa-wind text-gray-400 mr-1"></i> 風速</div>
                        <div class="text-2xl font-bold mt-1" id="obs-wind">--<span class="text-sm">m/s</span></div>
                        <div class="text-xs text-gray-500">即時觀測</div>
                    </div>

                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between h-32">
                        <div class="text-gray-400 text-xs"><i class="fa-solid fa-sun text-y-orange mr-1"></i> 紫外線</div>
                        <div class="text-2xl font-bold mt-1 text-y-orange" id="obs-uv">--</div>
                        <div class="text-xs text-gray-500">觀測/預測</div>
                    </div>

                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between h-32">
                        <div class="text-gray-400 text-xs"><i class="fa-solid fa-eye text-indigo-400 mr-1"></i> 能見度</div>
                        <div class="text-2xl font-bold mt-1">--<span class="text-sm">km</span></div>
                        <div class="text-xs text-gray-500">視野良好</div>
                    </div>

                    <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex flex-col justify-between h-32">
                        <div class="text-gray-400 text-xs"><i class="fa-regular fa-clock text-y-red mr-1"></i> 日出/日落</div>
                        <div class="flex justify-between items-end mt-2">
                            <div class="text-center">
                                <div class="text-xs text-gray-400">日出</div>
                                <div class="font-bold">05:40</div>
                            </div>
                            <div class="text-center">
                                <div class="text-xs text-gray-400">日落</div>
                                <div class="font-bold">18:25</div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>


            <!-- TAB 3: 預報 (Forecast) -->
            <section id="tab-forecast" class="tab-content px-0 pt-6">
                
                <!-- 24 Hours Forecast -->
                <div class="px-4 mb-2 flex justify-between items-end">
                    <h2 class="text-lg font-bold border-l-4 border-y-red pl-3">24小時預報</h2>
                    <span class="text-xs text-gray-400">每3小時</span>
                </div>
                
                <div class="overflow-x-auto hide-scrollbar pb-6 px-4">
                    <div class="flex space-x-4 w-max" id="hourly-forecast-container">
                        <!-- JS generated content will go here -->
                        <div class="text-sm text-gray-500 py-4">載入中...</div>
                    </div>
                </div>

                <div class="h-2 bg-gray-100 mb-6"></div>

                <!-- 7 Days Forecast -->
                <div class="px-4">
                    <h2 class="text-lg font-bold mb-4 border-l-4 border-y-red pl-3">未來 7 天預報</h2>
                    
                    <div class="flex flex-col divide-y divide-gray-100" id="weekly-forecast-container">
                         <!-- JS generated content -->
                         <div class="text-sm text-gray-500 py-4">載入中...</div>
                    </div>
                </div>

                <div class="mt-8 mb-4 text-center text-xs text-gray-400">
                    資料來源：交通部中央氣象署 (CWA)
                </div>
            </section>

        </main>
    </div>

    <!-- JavaScript Implementation -->
    <script>
        // ==========================================
        // SETTINGS & CONFIG
        // ==========================================
        
        // ★★★ 請在此填入您的中央氣象署 API KEY ★★★
        const CWA_API_KEY = ''; 
        
        // 城市與氣象站對應表 (用於 API 查詢)
        // 注意：不同 API endpoint 對地名的稱呼可能略有不同
        const LOCATION_MAP = {
            "Kaohsiung": { name: "高雄市", stationName: "高雄" },
            "Taipei": { name: "臺北市", stationName: "臺北" },
            "NewTaipei": { name: "新北市", stationName: "板橋" }, // 新北通常取板橋站為代表
            "Taichung": { name: "臺中市", stationName: "臺中" },
            "Tainan": { name: "臺南市", stationName: "臺南" },
            "Hualien": { name: "花蓮縣", stationName: "花蓮" }
        };

        // ==========================================
        // 1. Data Logic (Hybrid: Real API + Mock Fallback)
        // ==========================================
        
        // 模擬數據 (Fallback)
        const mockWeatherData = {
            "Kaohsiung": { current: { temp: 31, high: 33, low: 27, rain: 20, aqi: 45, aqiText: "良好", uv: 8, hum: 78, wind: 3.2 }, aiSummary: "(模擬) 今日多雲悶熱，午後山區有局部短暫陣雨。" },
            "Taipei": { current: { temp: 28, high: 30, low: 24, rain: 60, aqi: 55, aqiText: "普通", uv: 4, hum: 85, wind: 5.1 }, aiSummary: "(模擬) 受東北季風影響，整日陰雨綿綿，氣溫轉涼。" },
            "NewTaipei": { current: { temp: 27, high: 29, low: 23, rain: 70, aqi: 50, aqiText: "良好", uv: 3, hum: 88, wind: 4.5 }, aiSummary: "(模擬) 陰有雨，出門記得攜帶雨具，早晚偏涼。" },
            "Taichung": { current: { temp: 30, high: 32, low: 25, rain: 10, aqi: 85, aqiText: "普通", uv: 7, hum: 70, wind: 2.8 }, aiSummary: "(模擬) 晴朗穩定，紫外線強烈，空氣品質普通。" },
            "Tainan": { current: { temp: 31, high: 33, low: 26, rain: 10, aqi: 60, aqiText: "普通", uv: 8, hum: 75, wind: 3.0 }, aiSummary: "(模擬) 天氣炎熱，午後有零星陣雨機率，多補充水分。" },
            "Hualien": { current: { temp: 29, high: 31, low: 24, rain: 40, aqi: 30, aqiText: "良好", uv: 6, hum: 80, wind: 4.0 }, aiSummary: "(模擬) 多雲時陰，迎風面偶有雨，海邊活動請注意。" }
        };

        async function getWeatherData(locKey) {
            const loadingEl = document.getElementById('loading-overlay');
            loadingEl.style.display = 'flex';

            let resultData = null;

            if (CWA_API_KEY && CWA_API_KEY.length > 5) {
                try {
                    console.log("Fetching from CWA API...");
                    const apiData = await fetchFromCWA(locKey);
                    resultData = apiData;
                } catch (e) {
                    console.error("API Fetch Error:", e);
                    alert("API 讀取失敗，將切換為模擬資料。\n請檢查 Console 錯誤訊息或 API Key。");
                    resultData = getMockData(locKey);
                }
            } else {
                // No API Key, use Mock
                console.log("No API Key provided, using Mock Data.");
                resultData = getMockData(locKey);
            }

            loadingEl.style.display = 'none';
            return resultData;
        }

        // --- Mock Data Generator ---
        function getMockData(locKey) {
            const basic = mockWeatherData[locKey];
            return {
                name: LOCATION_MAP[locKey].name,
                current: basic.current,
                aiSummary: basic.aiSummary,
                hourly: generateHourlyData(basic.current.temp), // Mock function
                daily: generateDailyData(basic.current.high, basic.current.low) // Mock function
            };
        }

        // --- Real API Fetcher ---
        async function fetchFromCWA(locKey) {
            const locInfo = LOCATION_MAP[locKey];
            
            // 1. Fetch Current Observation (O-A0003-001)
            // 局屬氣象站-現在天氣觀測報告
            const obsUrl = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0003-001?Authorization=${CWA_API_KEY}&StationName=${encodeURIComponent(locInfo.stationName)}`;
            const obsRes = await fetch(obsUrl);
            const obsJson = await obsRes.json();
            const stationData = obsJson.records.Station[0]; // Assume first match is correct
            
            // Parse Observation
            const temp = Math.round(stationData.WeatherElement.AirTemperature);
            const hum = stationData.WeatherElement.RelativeHumidity;
            const wind = stationData.WeatherElement.WindSpeed;
            // Note: O-A0003-001 doesn't always have Rainfall/UV directly in simple fields, simplifying for demo
            
            // 2. Fetch Forecast (F-C0032-001) - 36 Hours (Good for PoP, High/Low Temp)
            // 一般天氣預報-今明36小時天氣預報
            const fcUrl = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=${CWA_API_KEY}&locationName=${encodeURIComponent(locInfo.name)}`;
            const fcRes = await fetch(fcUrl);
            const fcJson = await fcRes.json();
            const locationData = fcJson.records.location[0];
            
            // Helper to get element value by name
            const getEl = (name) => locationData.weatherElement.find(e => e.elementName === name).time[0].parameter;
            
            const pop = getEl('PoP').parameterName; // Probability of Precipitation
            const minT = getEl('MinT').parameterName;
            const maxT = getEl('MaxT').parameterName;
            const wx = getEl('Wx').parameterName; // Weather Description

            // Combine Data
            const currentData = {
                temp: temp,
                high: maxT,
                low: minT,
                rain: pop,
                aqi: 50, // API doesn't provide AQI in this endpoint, keeping mock/static
                aqiText: "普通",
                uv: 6, // API doesn't provide UV easily here, keeping mock
                hum: hum,
                wind: wind
            };

            return {
                name: locInfo.name,
                current: currentData,
                aiSummary: generateRuleBasedSummary(locInfo.name, wx, temp, pop),
                // For a full app, we would parse F-D0047-091 for hourly/daily. 
                // For this demo, we will use the Forecast 36H to fill the "Hourly" slot partially 
                // and fallback to mock generator for the full 7-day to prevent code explosion.
                hourly: generateHourlyData(temp, pop > 50), 
                daily: generateDailyData(maxT, minT, pop > 50)
            };
        }

        // Rule-based AI Summary Generator (前端簡易版 AI)
        function generateRuleBasedSummary(city, wx, temp, rain) {
            let msg = `${city}今日${wx}。`;
            if (temp >= 30) msg += "氣溫偏高，請注意防曬多喝水。";
            else if (temp <= 20) msg += "氣溫轉涼，請適時添加衣物。";
            else msg += "氣溫舒適，適合戶外活動。";
            
            if (rain >= 50) msg += " 降雨機率高，出門請記得帶傘。";
            return msg;
        }

        // --- Helper Generators (Mock/Fillers) ---
        // (保持原有的輔助函數，用於填補 API 未提供的長天期/小時數據)
        function generateHourlyData(baseTemp, isRainy = false) {
            let data = [];
            let currentHour = new Date().getHours();
            baseTemp = parseInt(baseTemp);
            
            for(let i=0; i<24; i++) {
                let h = (currentHour + i) % 24;
                let displayH = h.toString().padStart(2, '0') + ":00";
                let tempChange = 0;
                if(h >= 10 && h <= 15) tempChange = 2;
                else if (h >= 0 && h <= 5) tempChange = -3;
                
                let icon = isRainy ? 'fa-cloud-rain text-blue-400' : ((h>=6 && h<=18)? 'fa-sun text-y-orange' : 'fa-moon text-indigo-300');
                
                // Random variation to make charts look alive
                let val = baseTemp + tempChange + Math.floor(Math.random()*2);
                
                data.push({
                    time: displayH,
                    temp: val,
                    icon: icon,
                    rainProb: isRainy ? 50 + Math.floor(Math.random()*40) : Math.floor(Math.random()*20)
                });
            }
            return data;
        }

        function generateDailyData(highBase, lowBase, isRainy = false) {
            let data = [];
            let days = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
            let today = new Date().getDay();
            highBase = parseInt(highBase);
            lowBase = parseInt(lowBase);
            
            for(let i=0; i<7; i++) {
                let dIndex = (today + i) % 7;
                let dateObj = new Date();
                dateObj.setDate(dateObj.getDate() + i);
                let dateStr = (dateObj.getMonth()+1) + "/" + dateObj.getDate();
                
                let icon = 'fa-sun text-y-orange';
                let rain = 10;
                
                if(isRainy || Math.random() > 0.6) {
                    icon = 'fa-cloud-rain text-blue-400';
                    rain = 50 + Math.floor(Math.random()*40);
                } else if (Math.random() > 0.4) {
                    icon = 'fa-cloud-sun text-gray-400';
                    rain = 20;
                }

                data.push({
                    date: dateStr,
                    day: i===0 ? '今天' : days[dIndex],
                    high: highBase + Math.floor(Math.random()*3 - 1),
                    low: lowBase + Math.floor(Math.random()*3 - 1),
                    icon: icon,
                    rainProb: rain
                });
            }
            return data;
        }


        // ==========================================
        // 2. App Logic (UI Rendering)
        // ==========================================

        const locationSelect = document.getElementById('location-select');
        let currentLocation = "Kaohsiung"; // Default

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            updateDate();
            loadAndRender(currentLocation);
        });

        // 監聽地點變更
        locationSelect.addEventListener('change', (e) => {
            currentLocation = e.target.value;
            loadAndRender(currentLocation);
            window.scrollTo({top: 0, behavior: 'smooth'});
        });

        async function loadAndRender(locKey) {
            // Fetch Data (API or Mock)
            const data = await getWeatherData(locKey);
            if(data) renderData(data);
        }

        // 頁籤切換邏輯
        function switchTab(tabId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${tabId}`).classList.add('active');
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        function getUserLocation() {
            alert("正在使用 GPS 定位... \n(模擬切換至臺北市)");
            locationSelect.value = "Taipei";
            locationSelect.dispatchEvent(new Event('change'));
        }

        function updateDate() {
            const now = new Date();
            const str = `${now.getMonth()+1}月${now.getDate()}日 ${['週日','週一','週二','週三','週四','週五','週六'][now.getDay()]}`;
            document.getElementById('current-date').innerText = str;
        }

        // 核心渲染函式 (Input: Normalized Data Object)
        function renderData(data) {
            // --- Tab 1: Now ---
            document.getElementById('current-temp').innerText = data.current.temp;
            document.getElementById('today-high').innerText = data.current.high;
            document.getElementById('today-low').innerText = data.current.low;
            document.getElementById('current-rain').innerText = data.current.rain + '%';
            document.getElementById('current-aqi').innerText = `${data.current.aqi} ${data.current.aqiText}`;
            document.getElementById('ai-summary').innerText = data.aiSummary;

            // --- Tab 2: Observation ---
            document.getElementById('obs-rain-prob').innerHTML = `${data.current.rain}<span class="text-sm">%</span>`;
            document.getElementById('obs-humidity').innerHTML = `${data.current.hum}<span class="text-sm">%</span>`;
            document.getElementById('obs-wind').innerHTML = `${data.current.wind}<span class="text-sm">m/s</span>`;
            
            const uvEl = document.getElementById('obs-uv');
            uvEl.innerText = data.current.uv;
            if(data.current.uv >= 8) uvEl.className = "text-2xl font-bold mt-1 text-purple-600";
            else if(data.current.uv >= 6) uvEl.className = "text-2xl font-bold mt-1 text-y-orange";
            else uvEl.className = "text-2xl font-bold mt-1 text-green-500";

            // --- Tab 3: Forecast ---
            
            // 24H Forecast Render
            const hourlyContainer = document.getElementById('hourly-forecast-container');
            hourlyContainer.innerHTML = '';
            data.hourly.forEach(h => {
                const html = `
                    <div class="flex flex-col items-center min-w-[3.5rem] snap-center">
                        <span class="text-xs text-gray-500 mb-2">${h.time}</span>
                        <i class="fa-solid ${h.icon} text-xl mb-2"></i>
                        <span class="text-lg font-bold">${h.temp}°</span>
                        <span class="text-[10px] text-blue-500 mt-1 font-bold"><i class="fa-solid fa-umbrella text-[8px]"></i> ${h.rainProb}%</span>
                    </div>
                `;
                hourlyContainer.innerHTML += html;
            });

            // Weekly Forecast Render
            const weeklyContainer = document.getElementById('weekly-forecast-container');
            weeklyContainer.innerHTML = '';
            data.daily.forEach(d => {
                const html = `
                    <div class="flex items-center justify-between py-3">
                        <div class="w-20 text-sm">
                            <div class="font-bold text-gray-700">${d.day}</div>
                            <div class="text-xs text-gray-400">${d.date}</div>
                        </div>
                        <div class="flex-1 flex justify-center">
                            <i class="fa-solid ${d.icon} text-xl"></i>
                        </div>
                        <div class="w-16 text-center text-xs text-blue-500 font-bold bg-blue-50 rounded py-1">
                            ${d.rainProb}%
                        </div>
                        <div class="w-24 text-right flex justify-end gap-2 text-sm font-bold">
                            <span class="text-y-red">${d.high}°</span>
                            <span class="text-gray-300">/</span>
                            <span class="text-y-blue">${d.low}°</span>
                        </div>
                    </div>
                `;
                weeklyContainer.innerHTML += html;
            });
        }
    </script>
</body>
</html>
